name: Build LocalLLM APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Java ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1" --sdk_root=$ANDROID_SDK_ROOT
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      # ── 4. Clone llama.cpp ───────────────────────────────────────────────
      # We clone into the cpp source directory so CMakeLists can find it.
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch master \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp
          echo "llama.cpp cloned, HEAD: $(git -C app/src/main/cpp/llama.cpp rev-parse --short HEAD)"

      # ── 5. Install Gradle & generate gradlew ─────────────────────────────
      # The runner has no gradlew binary — we install Gradle via SDKMAN and
      # generate the wrapper. This means you never need to commit a binary.
      - name: Install Gradle and generate wrapper
        run: |
          # Install SDKMAN silently
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"

          # Install Gradle 8.4 (matches gradle-wrapper.properties)
          sdk install gradle 8.4

          # Run in a temp dir — gradle wrapper requires settings.gradle to exist,
          # so we generate there and copy the artifacts back
          mkdir /tmp/gradle-init && cd /tmp/gradle-init
          touch settings.gradle
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          cd $GITHUB_WORKSPACE
          cp /tmp/gradle-init/gradlew ./gradlew
          mkdir -p gradle/wrapper
          cp /tmp/gradle-init/gradle/wrapper/gradle-wrapper.jar ./gradle/wrapper/
          cp /tmp/gradle-init/gradle/wrapper/gradle-wrapper.properties ./gradle/wrapper/
          chmod +x gradlew

          echo "gradlew generated:"
          ls -lh gradlew gradle/wrapper/

      # ── 6. Gradle cache ──────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ── 7. Build Debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      # ── 8. Sign release APK (optional, skipped if no keystore) ───────────
      # To enable: add KEYSTORE_B64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # as GitHub Secrets, then uncomment this step.
      #
      # - name: Sign APK
      #   if: ${{ secrets.KEYSTORE_B64 != '' }}
      #   run: |
      #     echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > keystore.jks
      #     $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
      #       --ks keystore.jks \
      #       --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
      #       --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" \
      #       --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
      #       --out app/build/outputs/apk/debug/LocalLLM-signed.apk \
      #       app/build/outputs/apk/debug/app-debug.apk

      # ── 9. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: LocalLLM-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 10. Create release on tag push ──────────────────────────────────
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

